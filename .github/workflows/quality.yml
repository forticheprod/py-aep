name: Quality
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
jobs:
  ruff:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-quality')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ruff
        uses: astral-sh/ruff-action@v3
  mypy:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-quality')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Type check with mypy
        run: uv run mypy src/py_aep
  lfs:
    needs: [ruff, mypy]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-quality')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true
    - name: Create LFS archive
      run: tar cf lfs-objects.tar .git/lfs
    - uses: actions/upload-artifact@v7
      with:
        name: lfs-objects
        path: lfs-objects.tar
        retention-days: 1
  pytest-37:
    needs: lfs
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-quality')
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: lfs-objects
    - name: Restore LFS objects
      run: |
        tar xf lfs-objects.tar
        rm lfs-objects.tar
        git lfs checkout
    - name: Set up Python 3.7
      uses: actions/setup-python@v6
      with:
        python-version: '3.7'
    - name: Install dependencies
      run: pip install kaitaistruct>=0.9 "pytest>=7.0,<8.0"
    - name: Test with pytest
      run: PYTHONPATH=src pytest -v --no-header -ra --tb=short -o "addopts="
  pytest:
    needs: lfs
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-quality')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: lfs-objects
    - name: Restore LFS objects
      run: |
        tar xf lfs-objects.tar
        rm lfs-objects.tar
        git lfs checkout
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Test with pytest
      run: uv run pytest -v --no-header --override-ini="addopts=-ra -n auto" --tb=short